<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8850a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Wheat left -->
  <g opacity="0.85">
    <line x1="11" y1="52" x2="11" y2="18" stroke="#f5c400" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="11" y1="36" x2="7"  y2="28" stroke="#f5c400" stroke-width="1.2"/>
    <line x1="11" y1="42" x2="15" y2="34" stroke="#f5c400" stroke-width="1.2"/>
    <ellipse cx="11" cy="15" rx="3" ry="5" fill="#f5c400" transform="rotate(-5,11,15)"/>
    <ellipse cx="6"  cy="25" rx="2.5" ry="4" fill="#f5c400" transform="rotate(-20,6,25)"/>
    <ellipse cx="16" cy="31" rx="2.5" ry="4" fill="#f5c400" transform="rotate(20,16,31)"/>
  </g>

  <!-- Wheat right -->
  <g opacity="0.85">
    <line x1="53" y1="52" x2="53" y2="18" stroke="#f5c400" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="53" y1="36" x2="57" y2="28" stroke="#f5c400" stroke-width="1.2"/>
    <line x1="53" y1="42" x2="49" y2="34" stroke="#f5c400" stroke-width="1.2"/>
    <ellipse cx="53" cy="15" rx="3" ry="5" fill="#f5c400" transform="rotate(5,53,15)"/>
    <ellipse cx="58" cy="25" rx="2.5" ry="4" fill="#f5c400" transform="rotate(20,58,25)"/>
    <ellipse cx="48" cy="31" rx="2.5" ry="4" fill="#f5c400" transform="rotate(-20,48,31)"/>
  </g>

  <!-- Location pin -->
  <path d="M32,6 C26.5,6 22,10.5 22,16 C22,23.5 32,34 32,34 C32,34 42,23.5 42,16 C42,10.5 37.5,6 32,6 Z"
        fill="url(#pin)"/>
  <circle cx="32" cy="16" r="5.5" fill="white" opacity="0.92"/>
  <circle cx="32" cy="16" r="3"   fill="url(#pin)"/>
  <circle cx="32" cy="16" r="1.2" fill="white"/>

  <!-- Tractor (simplified) -->
  <g transform="translate(13,36)">
    <!-- body -->
    <rect x="0" y="0" width="28" height="14" rx="3" fill="#4caf50"/>
    <!-- hood -->
    <rect x="18" y="-5" width="14" height="10" rx="2" fill="#388e3c"/>
    <!-- cab window -->
    <rect x="2" y="2" width="12" height="9" rx="2" fill="#b3e5fc" opacity="0.8"/>
    <!-- exhaust -->
    <rect x="28" y="-9" width="3" height="8" rx="1.5" fill="#555"/>
    <!-- big wheel -->
    <circle cx="9"  cy="16" r="9" fill="#333"/>
    <circle cx="9"  cy="16" r="6" fill="#555"/>
    <circle cx="9"  cy="16" r="3" fill="#333"/>
    <!-- small wheel -->
    <circle cx="28" cy="17" r="5.5" fill="#333"/>
    <circle cx="28" cy="17" r="3.5" fill="#555"/>
    <circle cx="28" cy="17" r="1.5" fill="#333"/>
  </g>

  <!-- Gear (top-right of tractor) -->
  <g transform="translate(42,28)">
    <circle cx="7" cy="7" r="7"   fill="#888"/>
    <rect x="5.5" y="-1" width="3" height="5" rx="1" fill="#777"/>
    <rect x="5.5" y="10" width="3" height="5" rx="1" fill="#777"/>
    <rect x="-1" y="5.5" width="5" height="3" rx="1" fill="#777"/>
    <rect x="10" y="5.5" width="5" height="3" rx="1" fill="#777"/>
    <circle cx="7" cy="7" r="4"   fill="#aaa"/>
    <circle cx="7" cy="7" r="1.8" fill="#777"/>
  </g>

  <!-- Ground bar -->
  <rect x="0" y="56" width="64" height="8" rx="0" fill="#4caf50" opacity="0.6"/>
  <rect x="0" y="54" width="64" height="4" rx="2" fill="#66bb6a" opacity="0.7"/>
</svg>
